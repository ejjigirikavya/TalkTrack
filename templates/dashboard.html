<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
}

.container {
    margin-top: 40px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 15px;
    width: 420px;
    margin: auto;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border-radius: 8px;
    border: none;
    background: #38bdf8;
    cursor: pointer;
}

.stop-btn {
    background: #ef4444;
}

textarea {
    width: 100%;
    height: 100px;
    margin-top: 10px;
    border-radius: 8px;
}

.result {
    margin-top: 20px;
    text-align: left;
}

.error {
    color: red;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>🎤 TalkTrack AI</h2>

<form action="/upload" method="POST" enctype="multipart/form-data">
    <input type="file" name="ppt" required>
    <button>Upload PPT</button>
</form>

<button onclick="startSpeech()">▶ Start Presentation</button>
<button class="stop-btn" onclick="stopSpeech()">⏹ Stop</button>

<form action="/analyze" method="POST">
    <textarea id="speechText" name="text" placeholder="Your speech will appear here..."></textarea>
    <button>Analyze</button>
</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

{% if done %}
<div class="result">
<hr>
<h3>📊 Results</h3>

<p><b>Spoken:</b> {{ spoken_text }}</p>
<p>Accuracy: {{ accuracy }}%</p>
<p>Fillers: {{ fillers }}</p>
<p>Speed: {{ wpm }} WPM</p>
<p>Pauses: {{ pauses }}</p>

<h3>🧠 AI Feedback</h3>
<ul>
{% for f in feedback %}
<li>{{ f }}</li>
{% endfor %}
</ul>
</div>
{% endif %}

</div>
</div>

<script>
let recognition;
let finalText = "";

function startSpeech() {
    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = function(event) {
        let interimText = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
            let transcript = event.results[i][0].transcript;

            if (event.results[i].isFinal) {
                finalText += transcript + " ";
            } else {
                interimText += transcript;
            }
        }

        document.getElementById("speechText").value =
            finalText + interimText;
    };

    recognition.start();
}

function stopSpeech() {
    recognition.stop();
}
</script>

</body>
</html>
